<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disney STEP チェッカー Pro</title>
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); padding: 15px; color: #333; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { font-size: 1.1rem; text-align: center; margin-bottom: 20px; color: var(--primary); }
        
        .tab-menu { display: flex; gap: 8px; margin-bottom: 20px; background: #eee; padding: 4px; border-radius: 10px; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: transparent; cursor: pointer; border-radius: 8px; font-weight: bold; transition: 0.2s; }
        .tab-btn.active { background: white; color: var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        .progress-box { text-align: center; margin-bottom: 15px; background: #e8f0fe; padding: 10px; border-radius: 12px; font-weight: bold; }

        .category-group { border: 1px solid #eee; border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
        .category-header { 
            background: #fff; padding: 12px 15px; cursor: pointer; 
            display: flex; flex-direction: column;
            font-weight: bold; user-select: none; position: relative;
        }
        .category-header::after { 
            content: '▼'; font-size: 0.7rem; color: #999; 
            position: absolute; right: 15px; top: 15px; transition: transform 0.3s; 
        }
        .category-group.open .category-header::after { transform: rotate(180deg); }
        
        .badge-container { text-align: right; margin-top: 5px; }
        .badge { display: inline-block; background: var(--primary); color: white; font-size: 0.75rem; padding: 2px 10px; border-radius: 10px; }
        .badge.done { background: #34a853; }

        .category-content { display: none; background: #fff; border-top: 1px solid #f9f9f9; }
        .category-group.open .category-content { display: block; }

        .item { display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid #f9f9f9; cursor: pointer; }
        .item input { margin-right: 12px; width: 20px; height: 20px; flex-shrink: 0; }
        .item label { cursor: pointer; flex-grow: 1; font-size: 0.95rem; }
        
        .clear-btn { width: 100%; background: #fff; color: #ea4335; border: 1px solid #ea4335; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Disney STEP トレジャー管理</h1>
    <div class="progress-box">収集率: <span id="percent">0</span>%</div>
    
    <div class="tab-menu">
        <button class="tab-btn active" id="btn-star2" onclick="showTab('star2')">★2 Normal</button>
        <button class="tab-btn" id="btn-star3" onclick="showTab('star3')">★3 Normal</button>
    </div>

    <div id="list-container"></div>

    <button class="clear-btn" onclick="clearAll()">チェックを全リセット</button>
</div>

<script>
const data = {
    star2: {
        "チップとデールの最高な毎日": ["チップ[サックス]", "デール[ドラム]"],
        "シンデレラのクリスタルオブジェ": ["立派な引き馬", "魔法の馬車"],
        "眠れる森の美女のピンバッジ": ["ブライア・ローズ", "森の動物たち"],
        "グーフィーキャンピングピンバッジ": ["グーフィーのリュック", "グーフィーのホットサンド"],
        "美女と野獣のブックマーカー": ["コグスワース", "ルミエール"],
        "ベイマックスのピンバッジ": ["ハニーレモン", "ワサビ"],
        "大親友のキラキラな日常": ["ピンクのドットワンピースミニー", "パープルコーデのデイジー"],
        "アラジンのゴールドチャーム": ["ジャスミン", "魔法のランプ"],
        "ドナルドのマリンルックピンバッジ": ["ドナルドのパドルシップ", "ドナルドの浮き輪"],
        "ベストフレンズのピンバッジ": ["ミニー", "ドナルド"],
        "トイ・ストーリーのピンバッジ": ["バズ", "ジェシー"],
        "ラプンツェルのゴールドチャーム": ["マキシマス", "パスカル"],
        "ピーター・パンのピンバッジ": ["ティンカー・ベル", "ウィンディ"],
        "不思議の国のアリスのピンバッジ": ["白うさぎ", "ドアノブ"],
        "ミッキーのゴールドチャーム": ["ミッキーアイコン"]
    },
    star3: {
        "チップとデールの最高な毎日": ["チップとデール"],
        "シンデレラのクリスタルオブジェ": ["ガラスの靴", "シンデレラ"],
        "眠れる森の美女のピンバッジ": ["オーロラ姫＆フィリップ王子"],
        "グーフィーキャンピングピンバッジ": ["グーフィーとテント"],
        "美女と野獣のブックマーカー": ["ベル", "ビースト"],
        "ベイマックスのピンバッジ": ["ベイマックス", "ヒロ"],
        "大親友のキラキラな日常": ["赤いドットワンピースのミニー", "ポニーテールのデイジー"],
        "アラジンのゴールドチャーム": ["アラジン", "ジーニー"],
        "ドナルドのマリンルックピンバッジ": ["海とドナルド"],
        "ベストフレンズのピンバッジ": ["ミッキー"],
        "トイ・ストーリーのピンバッジ": ["ウッディ"],
        "ラプンツェルのゴールドチャーム": ["ラプンツェル"],
        "ピーター・パンのピンバッジ": ["ピーター・パン"],
        "不思議の国のアリスのピンバッジ": ["アリス"],
        "ミッキーのゴールドチャーム": ["歩き出すミッキー"]
    }
};

let currentTab = 'star2';
// 開いているカテゴリを保持するためのセット
let openCategories = new Set();

function showTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`btn-${tab}`).classList.add('active');
    render();
}

function render() {
    const container = document.getElementById('list-container');
    container.innerHTML = '';
    const categories = data[currentTab];

    for (const catName in categories) {
        const group = document.createElement('div');
        const isOpen = openCategories.has(catName);
        group.className = `category-group ${isOpen ? 'open' : ''}`;
        
        const items = categories[catName];
        let checkedCount = 0;
        
        // 各アイテムのチェック状態を確認
        items.forEach(name => {
            const id = `${currentTab}-${name}`;
            if (localStorage.getItem(id) === 'true') {
                checkedCount++;
            }
        });

        const remains = items.length - checkedCount;
        const badgeClass = remains === 0 ? 'badge done' : 'badge';
        const badgeText = remains === 0 ? '完了' : `あと ${remains}`;

        group.innerHTML = `
            <div class="category-header" onclick="toggleCategory('${catName}', this)">
                <span>${catName}</span>
                <div class="badge-container"><span class="${badgeClass}">${badgeText}</span></div>
            </div>
            <div class="category-content">
                ${items.map(name => {
                    const id = `${currentTab}-${name}`;
                    const isChecked = localStorage.getItem(id) === 'true';
                    return `
                        <div class="item" onclick="toggleItem('${id}', event)">
                            <input type="checkbox" id="${id}" ${isChecked ? 'checked' : ''} onclick="event.stopPropagation(); toggleItem('${id}', event)">
                            <label for="${id}" onclick="event.stopPropagation()">${name}</label>
                        </div>
                    `;
                }).join('')}
            </div>
        `;
        container.appendChild(group);
    }
    updateProgress();
}

function toggleCategory(catName, el) {
    if (openCategories.has(catName)) {
        openCategories.delete(catName);
    } else {
        openCategories.add(catName);
    }
    el.parentElement.classList.toggle('open');
}

function toggleItem(id, event) {
    const cb = document.getElementById(id);
    // クリックイベントがinput自体から来た場合は、既にcheckedが反転しているのでそのまま使う
    if (event.target.tagName !== 'INPUT') {
        cb.checked = !cb.checked;
    }
    localStorage.setItem(id, cb.checked);
    render(); // 再描画してバッジを更新
}

function clearAll() {
    if(confirm('全てのデータをリセットしますか？')) {
        localStorage.clear();
        openCategories.clear();
        render();
    }
}

function updateProgress() {
    let totalItems = 0;
    let checkedCount = 0;

    for (const tab in data) {
        for (const cat in data[tab]) {
            data[tab][cat].forEach(name => {
                totalItems++;
                if (localStorage.getItem(`${tab}-${name}`) === 'true') {
                    checkedCount++;
                }
            });
        }
    }
    const percent = Math.round((checkedCount / totalItems) * 100) || 0;
    document.getElementById('percent').innerText = percent;
}

render();
</script>
</body>
</html>
